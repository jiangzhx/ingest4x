[server]
bind_address = "0.0.0.0:8090"
log_level = "info"
log_format = "json"
max_event_bytes = 262144

[management]
bind_address = "127.0.0.1:18090"
admin_password = "ingest4x"

[redis]
address = "redis://localhost:6379"
connections_max_size = 500
connections_min_size = 10

[database]
url = "sqlite://db/ingest4x.db?mode=rwc"
refresh_interval_secs = 3

[wal]
dir = "./wal"
flush_max_interval = "10ms"
flush_max_records = 1000
# TODO: field reserved; byte-based group commit trigger is not implemented yet.
flush_max_bytes = 4194304
no_sync = false
wal_segment_max_bytes = 134217728

[events.sink.stdout_all]
type = "stdout"

[[events.valid.routes]]
sinks = ["stdout_all"]

[[events.invalid.routes]]
sinks = ["stdout_all"]
