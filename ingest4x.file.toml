[server]
bind_address = "0.0.0.0:8090"
log_level = "info"
log_format = "json"

[management]
bind_address = "127.0.0.1:18090"
admin_password = "ingest4x"

[redis]
address = "redis://localhost:6379"
connections_max_size = 500
connections_min_size = 10

[database]
url = "sqlite://db/ingest4x.db?mode=rwc"
refresh_interval_secs = 3

[events.sink.file_valid]
type = "file"
path = "logs/events-valid.jsonl"
format = "jsonl"
rotation = "hourly"
retention_files = 24

[events.sink.file_invalid]
type = "file"
path = "logs/events-invalid.jsonl"
format = "jsonl"
rotation = "hourly"
retention_files = 24

[[events.valid.routes]]
sinks = ["file_valid"]
ack = ["file_valid"]

[[events.invalid.routes]]
sinks = ["file_invalid"]
ack = ["file_invalid"]
